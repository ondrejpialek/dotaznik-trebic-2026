  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #557A53;
      --primary-light: #7AA874;
      --primary-pale: #EBF2EA;
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --text: #2A3328;
      --text-secondary: #6B7E6A;
      --border: #D8E3D7;
      --radius: 14px;
      --radius-sm: 9px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sofia Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 20px;
    }
    .logo {
      font-weight: 700;
      font-size: 14px;
      color: var(--primary);
      letter-spacing: -0.2px;
    }
    .step-indicator {
      font-size: 13px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar { height: 4px; background: var(--border); }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      width: 0%;
      transition: width 0.45s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ── MAIN ── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 16px 120px;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active {
      display: block;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BLOCK HEADER ── */
    .block-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .block-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      line-height: 1.25;
    }

    /* ── QUESTION CARD ── */
    .question {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .question-text {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .question-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .option:hover { border-color: var(--primary-light); background: var(--primary-pale); }
    .option.selected { border-color: var(--primary); background: var(--primary-pale); }
    .option.disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }
    .option input[type="checkbox"],
    .option input[type="radio"] {
      width: 18px; height: 18px; min-width: 18px;
      margin-top: 2px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .option-label { font-size: 14px; line-height: 1.45; flex: 1; cursor: pointer; }

    /* ── OTHER TEXT INPUT ── */
    .other-input {
      display: none;
      margin-top: 10px;
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
      min-height: 54px;
      line-height: 1.5;
    }
    .other-input.visible { display: block; }
    .other-input:focus { border-color: var(--primary); }

    /* ── INLINE FOLLOWUP (textarea inside question card) ── */
    .inline-followup {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .followup-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .inline-followup textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .inline-followup textarea:focus { border-color: var(--primary); }

    /* ── TEXTAREA ── */
    .question textarea {
      width: 100%;
      min-height: 96px;
      padding: 11px 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .question textarea:focus { border-color: var(--primary); }

    /* ── SELECT ── */
    .question select {
      width: 100%;
      padding: 11px 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      cursor: pointer;
    }
    .question select:focus { border-color: var(--primary); }

    /* ── EMAIL INPUT ── */
    .email-input {
      width: 100%;
      padding: 11px 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
      margin-top: 8px;
    }
    .email-input:focus { border-color: var(--primary); }

    /* ── TRANSITION NOTE ── */
    .transition-note {
      background: linear-gradient(135deg, var(--primary-pale), #F0F7EF);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 14px;
      border-left: 4px solid var(--primary);
      font-size: 14px;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ── GATEWAY CARD ── */
    .gateway-card {
      background: linear-gradient(135deg, var(--primary-pale), #F0F7EF);
      border-radius: var(--radius);
      padding: 22px 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .gateway-card .question-text {
      font-size: 16px;
      margin-bottom: 14px;
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    /* ── CONDITIONAL (animated) ── */
    .conditional { transition: opacity 0.2s; }

    /* ── NAVIGATION ── */
    /* ── INFO BUTTON + TOOLTIP ── */
    .info-btn { display: none !important; }
    .info-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 17px; height: 17px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-left: 7px;
      vertical-align: middle;
      flex-shrink: 0;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      position: relative;
      top: -1px;
    }
    .info-btn:hover, .info-btn.active {
      background: var(--primary);
      color: #fff;
    }
    .tooltip-panel {
      position: fixed;
      z-index: 600;
      background: #1b2b1a;
      color: #deeedd;
      border-radius: 10px;
      padding: 13px 15px;
      max-width: min(300px, calc(100vw - 32px));
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }
    .tooltip-panel.hidden { display: none; }
    .tooltip-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #7AA874;
      gap: 12px;
    }
    .tooltip-close {
      background: none; border: none;
      color: #deeedd; cursor: pointer;
      font-size: 18px; line-height: 1;
      padding: 0; opacity: 0.6; flex-shrink: 0;
    }
    .tooltip-close:hover { opacity: 1; }

    /* ── REQUIRED MARK ── */
    .required-mark {
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      margin-left: 3px;
      line-height: 1;
    }

    /* ── SEMANTIC DIFFERENTIAL ── */
    .semantic-diff {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }
    .sd-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .sd-left {
      font-size: 13px;
      color: var(--text);
      text-align: right;
      line-height: 1.3;
    }
    .sd-right {
      font-size: 13px;
      color: var(--text);
      text-align: left;
      line-height: 1.3;
    }
    .sd-scale {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sd-option {
      display: flex;
      cursor: pointer;
    }
    .sd-option input[type="radio"] {
      display: none;
    }
    .sd-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: block;
      transition: background 0.15s, border-color 0.15s;
      background: var(--surface);
    }
    .sd-option input[type="radio"]:checked + .sd-dot {
      background: var(--primary);
      border-color: var(--primary);
    }
    .sd-option:hover .sd-dot {
      border-color: var(--primary-light);
      background: var(--primary-pale);
    }
    @media (max-width: 480px) {
      .sd-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .sd-left { text-align: left; }
      .sd-scale { justify-content: center; }
      .sd-right { text-align: left; color: var(--text-secondary); font-size: 12px; }
      .sd-dot { width: 30px; height: 30px; }
    }

    /* ── VALIDATION ── */
    .question.has-error,
    .gateway-card.has-error {
      border-color: #d9534f;
      background: #fff8f7;
    }
    .question.has-error .question-text,
    .gateway-card.has-error .question-text {
      color: #d9534f;
    }
    .error-msg {
      text-align: center;
      font-size: 13px;
      color: #d9534f;
      font-weight: 500;
      padding-bottom: 6px;
    }

    .nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px max(14px, env(safe-area-inset-bottom));
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .nav.nav-visible {
      transform: translateY(0);
    }
    .nav-inner {
      display: flex;
      gap: 10px;
      max-width: 640px;
      margin: 0 auto;
      justify-content: center;
    }
    .btn {
      padding: 11px 22px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
      flex: 0 0 auto;
    }
    .btn-back {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-next {
      background: var(--primary);
      color: #fff;
    }
    /* :hover stavy jen na zařízeních s ukazatelem (myš, trackpad) — iOS Safari
       jinak na první tap zafixuje hover stav a vyžaduje druhý tap pro click. */
    @media (hover: hover) {
      .btn-back:hover { background: var(--bg); }
      .btn-next:hover { background: var(--primary-light); }
    }

    /* ── SCROLL HINT (samostatný overlay, nezávislý na navbaru) ── */
    .scroll-hint {
      position: fixed;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 18px));
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(34, 34, 34, 0.88);
      color: #fff;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      z-index: 99;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .scroll-hint.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-sentinel { display: block; height: 1px; }

    /* ── INTRO ── */
    .intro-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 24px 28px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .intro-icon { font-size: 52px; margin-bottom: 18px; text-align: center; }
    .intro-card h1 {
      font-size: 26px; font-weight: 700;
      margin-bottom: 18px; color: var(--text);
      line-height: 1.25; text-align: center;
    }
    .intro-card p {
      color: var(--text-secondary); font-size: 16px;
      line-height: 1.65; margin-bottom: 14px;
    }
    .intro-card p.lead { font-weight: 600; color: var(--text); }
    .intro-card p.note { font-size: 14px; }
    .intro-list {
      margin: 0 0 14px; padding-left: 22px;
      color: var(--text-secondary); font-size: 16px; line-height: 1.65;
    }
    .intro-list li { margin-bottom: 4px; }

    .block-note {
      background: #f5f3ee;
      border-left: 3px solid var(--primary);
      padding: 12px 16px;
      margin-bottom: 18px;
      font-style: italic;
      font-size: 14.5px;
      color: var(--text-secondary);
      line-height: 1.55;
      border-radius: 4px;
    }
    .intro-meta {
      display: flex; gap: 0; justify-content: center;
      margin-top: 22px; flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }
    .intro-meta-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-secondary);
      padding: 4px 14px;
      border-right: 1px solid var(--border);
    }
    .intro-meta-item:last-child { border-right: none; }
    .btn-start {
      display: block; width: 100%;
      padding: 16px; background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 24px;
      transition: background 0.2s;
    }
    .btn-start:hover { background: var(--primary-light); }

    /* ── END ── */
    .end-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .end-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .end-card p { color: var(--text-secondary); font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
    .end-card .question { text-align: left; margin-top: 20px; }

    /* — E-mail capture (před odesláním) — */
    .signup-card {
      background: linear-gradient(180deg, #f7f5ee 0%, #f0ede2 100%);
      border: 1px solid #d8d2bf;
      border-radius: 14px;
      padding: 28px 26px;
      margin-top: 20px;
      text-align: left;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .signup-card .signup-title {
      font-size: 20px; font-weight: 700; color: var(--text);
      line-height: 1.3; margin: 0 0 14px;
    }
    .signup-bullets {
      list-style: none; padding: 0; margin: 0 0 20px;
    }
    .signup-bullets li {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 6px 0; font-size: 15px; color: var(--text);
      line-height: 1.5;
    }
    .signup-bullets svg { flex-shrink: 0; margin-top: 2px; color: var(--primary); }

    .signup-card .email-input {
      font-size: 16px; padding: 14px 16px;
      border-radius: 10px; border: 1.5px solid #cfc9b3;
      background: #fff;
    }
    .signup-card .email-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(85,122,83,.15); }

    .consent-toggle {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; margin-top: 12px;
      background: #fff; border: 1.5px solid #cfc9b3;
      border-radius: 10px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .consent-toggle:hover { border-color: #b6ad8e; }
    .consent-toggle input { margin: 2px 0 0; flex-shrink: 0; width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .consent-toggle.checked { border-color: var(--primary); background: #f4f7f3; }
    .consent-toggle .consent-text { font-size: 15px; line-height: 1.5; color: var(--text); }
    .consent-toggle .consent-note { font-size: 13px; color: var(--text-secondary); margin-top: 2px; display: block; }

    .submit-row { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
    .submit-row .btn-submit {
      width: 100%; padding: 16px;
      background: var(--primary); color: #fff; border: none;
      border-radius: 10px; font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .submit-row .btn-submit:hover { background: var(--primary-light); }
    .submit-row .skip { text-align: center; font-size: 13px; color: var(--text-secondary); }
    .submit-row .skip a { color: var(--text-secondary); text-decoration: underline; cursor: pointer; }

    .modal-bg-confirm {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; z-index: 200;
    }
    .modal-bg-confirm.hidden { display: none; }
    .modal-confirm {
      background: #fff; border-radius: 14px;
      max-width: 440px; width: 100%;
      padding: 28px 26px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-confirm h3 { margin: 0 0 10px; font-size: 18px; color: var(--text); }
    .modal-confirm p { margin: 0 0 20px; color: var(--text-secondary); font-size: 15px; line-height: 1.5; }
    .modal-confirm .modal-actions { display: flex; flex-direction: column; gap: 10px; }
    .modal-confirm button {
      width: 100%; padding: 13px 16px;
      border-radius: 10px; border: none;
      font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .modal-confirm .btn-primary { background: var(--primary); color: #fff; }
    .modal-confirm .btn-primary:hover { background: var(--primary-light); }
    .modal-confirm .btn-secondary { background: #fff; color: var(--text); border: 1.5px solid #cfc9b3; }
    .modal-confirm .btn-secondary:hover { border-color: var(--primary); }
    .modal-confirm .btn-link { background: none; color: var(--text-secondary); padding: 8px; }
    .modal-confirm .btn-link:hover { color: var(--text); }
